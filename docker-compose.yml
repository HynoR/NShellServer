# ===== TLS mode (direct HTTPS with your own cert/key) =====
services:
  nshellserver:
    build:
      context: .
      dockerfile: Dockerfile
    # To use the pre-built image from ghcr.io instead of building locally,
    # comment out `build:` above and uncomment the line below:
    # image: ghcr.io/hynor/nshellserver:latest
    container_name: nshellserver
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      NSHELL_ADDR: ":8443"
      NSHELL_CERT: "/certs/cert.pem"
      NSHELL_KEY:  "/certs/key.pem"
      NSHELL_DB:   "/data/nshell.db"
    volumes:
      # TLS cert/key — place cert.pem + key.pem in ./certs/ before starting
      - ./certs:/certs:ro
      # SQLite database persistence
      - nshell_data:/data
    command: ["serve"]

# ===== Self-host mode (plain HTTP behind a reverse proxy) =====
